<!DOCTYPE html>
<html>
<head>
    <title>AI Blood Group Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="background-animation"></div>

<div class="card">
    <h1>🧬 AI Blood Group Detection</h1>
    <p class="subtitle">Fingerprint Based Deep Learning Prediction</p>

    <form id="upload-form" enctype="multipart/form-data">
        
        <label class="drop-zone" id="drop-zone">
            <input type="file" name="file" id="file-input" accept="image/*" hidden required>
            <span id="upload-text">Drag & Drop Fingerprint or Click to Upload</span>
            <img id="preview-image" class="hidden">
        </label>

        <button type="submit" class="predict-btn">Predict Blood Group</button>
    </form>

    <div id="loader" class="loader hidden"></div>

    <div id="result-card" class="result hidden">
        <h2 id="prediction-text"></h2>
        <div class="confidence-container">
            <div id="confidence-bar"></div>
        </div>
        <p id="confidence-text"></p>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
